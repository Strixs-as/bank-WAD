<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход — BankSystem</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .card {
            background: #0d0d1a; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; padding: 2.5rem; width: 100%; max-width: 420px; color: #fff;
        }
        .logo { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; }
        h1 { text-align: center; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
        .sub { text-align: center; color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-bottom: 2rem; }
        label { display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; }
        input[type=text], input[type=password] {
            width: 100%; padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 0.95rem; margin-bottom: 1.1rem; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(102,126,234,0.08); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .btn {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .alert {
            padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem;
        }
        .alert-error { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
        .alert-success { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
        .link-row { text-align: center; margin-top: 1.25rem; color: rgba(255,255,255,0.45); font-size: 0.88rem; }
        .link-row a { color: #a78bfa; text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }
        .back { display: block; text-align: center; margin-top: 0.75rem; color: rgba(255,255,255,0.35); font-size: 0.82rem; text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🏦</div>
    <h1>Вход</h1>
    <p class="sub">Введите данные для входа в систему</p>

    <!-- Spring Security error/logout messages -->
    <div th:if="${param.error}" class="alert alert-error">⚠️ Неверный email или пароль</div>
    <div th:if="${param.logout}" class="alert alert-success">✅ Вы успешно вышли из системы</div>

    <form th:action="@{/login}" method="post">
        <label for="username">Email</label>
        <input type="text" id="username" name="username" placeholder="example@mail.com" required autocomplete="email"/>

        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password"/>

        <!-- CSRF token is automatically injected by Thymeleaf + Spring Security -->
        <button type="submit" class="btn">Войти</button>
    </form>

    <div class="link-row">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
    <a href="/index.html" class="back">← Вернуться на главную</a>
</div>
</body>
</html>
